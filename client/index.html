<!doctype html>
<html lang="th">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#161412" />
    <title>ShipTrack — ระบบติดตามรายการส่ง</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-v2.png" />
  </head>

  <body>
    <div id="root">
      <!-- Pre-mount Splash Screen -->
      <style>
        .splash-container {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background-color: #161412;
          z-index: 9999;
          font-family: "Noto Sans Thai", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          color: #f0ebe3;
          transition: opacity 0.5s ease-out;
          animation: splash-enter 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .splash-logo {
          width: 80px;
          height: 80px;
          animation: splash-pulse 2s infinite ease-in-out;
          margin-bottom: 24px;
        }
        .splash-title {
          font-size: 1.5rem;
          font-weight: 800;
          letter-spacing: 0.05em;
          margin: 0 0 8px 0;
          color: #f0ebe3;
        }
        .splash-subtitle {
          font-size: 0.875rem;
          font-weight: 500;
          color: #8a7f74;
          margin: 0 0 32px 0;
        }
        .splash-loader {
          width: 40px;
          height: 40px;
          border: 3px solid rgba(232, 57, 42, 0.15);
          border-radius: 50%;
          border-top-color: #e8392a;
          animation: splash-spin 0.8s linear infinite;
        }
        @keyframes splash-pulse {
          0%, 100% {
            transform: scale(1);
            filter: drop-shadow(0 0 8px rgba(232, 57, 42, 0.2));
          }
          50% {
            transform: scale(1.05);
            filter: drop-shadow(0 0 20px rgba(232, 57, 42, 0.4));
          }
        }
        @keyframes splash-spin {
          to {
            transform: rotate(360deg);
          }
        }
        @keyframes splash-enter {
          from {
            opacity: 0;
            transform: translateY(18px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
      </style>
      <div class="splash-container">
        <svg class="splash-logo" viewBox="0 0 64 64" role="img" aria-label="ShipTrack">
          <path d="M 35.0 9.2 A 23 23 0 0 1 53.2 40.8" fill="none" stroke="#5a4f46" stroke-width="4.5" stroke-linecap="butt"/>
          <path d="M 50.3 46.0 A 23 23 0 0 1 13.7 46.0" fill="none" stroke="#5a4f46" stroke-width="4.5" stroke-linecap="butt"/>
          <path d="M 10.8 40.8 A 23 23 0 0 1 29.0 9.2" fill="none" stroke="#5a4f46" stroke-width="4.5" stroke-linecap="butt"/>
          <path d="M 18.5 41.5 L 32 20 L 45.5 41.5" fill="none" stroke="#e8392a" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="butt"/>
        </svg>
        <h1 class="splash-title">ShipTrack</h1>
        <p class="splash-subtitle">ระบบติดตามรายการส่ง</p>
        <div class="splash-loader"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
